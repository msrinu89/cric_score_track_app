name: Build Android APKs

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev]

    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --flavor ${{ matrix.env }} -t lib/main.dart

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.env }}
          path: build/app/outputs/flutter-apk/app-${{ matrix.env }}.apk